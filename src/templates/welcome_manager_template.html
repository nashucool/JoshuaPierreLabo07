<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue à la direction</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fff8e1; margin: 0; padding: 40px; }
        .container { background: white; border-radius: 10px; margin: auto; max-width: 560px; padding: 40px; text-align: center; }
        h1 { color: #ef6c00; }
        p { color: #444; font-size: 18px; line-height: 1.6; }
        .user-id { color: #777; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⭐ Bienvenue dans l'équipe de direction, {{name}} !</h1>
        <p>Votre compte de direction du Magasin du Coin est maintenant prêt.</p>
        <p>Nous vous souhaitons beaucoup de succès dans vos nouvelles fonctions.</p>
        <p class="user-id">ID directeur : {{user_id}}</p>
        <p class="user-id">Adresse courriel : {{email}}</p>
        <p class="user-id">Compte créé le {{creation_date}}</p>
    </div>
</body>
</html>
