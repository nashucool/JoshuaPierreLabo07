<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue dans l'équipe</title>
    <style>
        body { font-family: Arial, sans-serif; background: #e8f5e9; margin: 0; padding: 40px; }
        .container { background: white; border-radius: 10px; margin: auto; max-width: 560px; padding: 40px; text-align: center; }
        h1 { color: #2e7d32; }
        p { color: #444; font-size: 18px; line-height: 1.6; }
        .user-id { color: #777; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 Salut et bienvenue dans l'équipe, {{name}} !</h1>
        <p>Nous sommes heureux de t'accueillir parmi les employés du Magasin du Coin.</p>
        <p>Au plaisir de travailler ensemble !</p>
        <p class="user-id">ID employé : {{user_id}}</p>
        <p class="user-id">Adresse courriel : {{email}}</p>
        <p class="user-id">Compte créé le {{creation_date}}</p>
    </div>
</body>
</html>
